name: Build / Electron

on:
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand to build'
        required: false
        type: choice
        default: 'remoteit'
        options:
          - remoteit
          - cachengo
      skip_signing:
        description: 'Skip code signing'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  CI: ''
  FONT_AWESOME_AUTH_TOKEN: ${{ secrets.FONT_AWESOME_AUTH_TOKEN }}
  SKIP_SIGNING: ${{ inputs.skip_signing }}
  BRAND: ${{ inputs.brand || 'remoteit' }}
  GH_TOKEN: ${{ secrets.github_token }}

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Node.js and NPM
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Set npm version
        run: npm install -g npm@10

      - name: Authenticate with fontawesome NPM repo
        run: |
          npm config set "@fortawesome:registry" https://npm.fontawesome.com/
          npm config set "//npm.fontawesome.com/:_authToken" ${{ secrets.FONT_AWESOME_AUTH_TOKEN }}

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install SSL.com Sign Tool on Windows
        if: matrix.os == 'windows-latest' && !inputs.skip_signing
        run: |
          curl https://www.ssl.com/download/codesigntool-for-windows/ --output ~/Downloads/CodeSignTool.zip
          unzip ~/Downloads/CodeSignTool.zip -d ~/CodeSignTool

      - name: Install dependencies
        run: npm install

      - name: Install electron dependencies locally
        run: cd electron && npm install --workspaces=false

      - name: Build and publish Electron app
        env:
          CSC_LINK: ${{ matrix.os == 'macos-14' && secrets.mac_certs || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-14' && secrets.mac_certs_password || '' }}
        run: cd electron && npm run release
